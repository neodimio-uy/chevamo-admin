# Cloud Build pipeline para chevamo-admin (Next.js dashboard).
# 1. Install deps
# 2. Build static export → out/
# 3. Deploy a Firebase Hosting (admin.chevamo.com.uy)
#
# El backend (Cloud Functions, Firestore rules) vive en su propio repo
# (chevamo-backend) con su propio trigger.

steps:
  - id: install
    name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  - id: build
    name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    waitFor: ['install']

  - id: deploy
    name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools && \
        firebase deploy \
          --only hosting \
          --project vamo-dbad6 \
          --force \
          --non-interactive
    waitFor: ['build']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'
